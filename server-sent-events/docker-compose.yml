services: 
    postgres:
        container_name: postgres-17
        image: postgres:17-alpine
        restart: unless-stopped
        environment: 
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: postgres
        ports: 
        - "5432:5432"
        volumes: 
        - pg_data:/var/lib/postgresql/data
volumes: 
    pg_data:
